name: build-worker-image

# Builda l'immagine Docker del worker headful (apps/worker — Fase 3) e la
# pubblica su ghcr.io. Il container polla capture_sessions e drivea Chromium
# headful + xvfb + noVNC per siti dietro login. Vedi apps/worker/README.md.
#
# Build context = repo root (il Dockerfile copia pnpm-lock + i package.json
# di tutti i workspace per risolvere la dipendenza pnpm).

on:
  push:
    branches: [main]
    paths:
      - 'apps/worker/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/build-worker-image.yml'
  workflow_dispatch:

concurrency:
  group: build-worker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: federicokalik/calicchia-worker

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Estrai metadata immagine
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build e push immagine
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64