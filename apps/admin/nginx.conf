# nginx config for the admin SPA.
# Serves the static Vite build and proxies /api + /media to the api service
# (same-origin → the auth cookie stays first-party on the admin domain).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS. Used with a variable in proxy_pass below so nginx
    # resolves "api" at request time, not at startup — otherwise nginx refuses
    # to start whenever the api container is not yet up (cold start, redeploy).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API proxy — "api" is the compose service name on the internal network.
    location /api/ {
        set $upstream_api http://api:3001;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /media/ {
        set $upstream_media http://api:3001;
        proxy_pass $upstream_media;
        proxy_set_header Host $host;
    }

    # SPA fallback — client-side routing (react-router v7).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — long cache (Vite emits content-hashed filenames).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
