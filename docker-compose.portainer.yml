# Production stack — Calicchia Design Platform
# Variant for: Dockhand (container management) + CloudPanel (reverse proxy + TLS).
# (Filename retained as `portainer.yml` per migration: lo stack è identico, non
# dipende dall'orchestratore. Dockhand carica i compose dal repo via Git
# polling — vedi docs/portainer-cloudpanel.md per il setup.)
#
# Deploy: in Dockhand crea uno "Stack" con sorgente Git e path a questo file.
# Le variabili ${...} vengono da un .env nello stack o dalle env dell'UI Dockhand
# (lo stesso .env.prod che usavi su Dokploy/Portainer, vedi .env.prod.example).
#
# Routing: le 3 web app pubblicano le porte SOLO su 127.0.0.1; CloudPanel
# (nginx + Let's Encrypt sull'host) fa il reverse proxy verso quei loopback.
# Vedi docs/portainer-cloudpanel.md per gli snippet dei 3 siti CloudPanel.
#
# Le immagini sono pre-buildate dai workflow GitHub Actions
# (.github/workflows/build-*-image.yml) e pubblicate su ghcr.io. Dockhand
# delega il pull al Docker daemon dell'host: assicurati che l'host sia loggato
# (`docker login ghcr.io -u <user> --password-stdin`, PAT con `read:packages`).

services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-off: applica le migrazioni pending, poi esce. Stessa immagine dell'api
  # (contiene scripts/migrate.ts + i file SQL). Idempotente — gira a ogni deploy.
  migrate:
    image: ghcr.io/federicokalik/calicchia-api:latest
    restart: "no"
    command: ["pnpm", "exec", "tsx", "scripts/migrate.ts"]
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net

  api:
    image: ghcr.io/federicokalik/calicchia-api:latest
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      WEBHOOK_ENCRYPTION_KEY: ${WEBHOOK_ENCRYPTION_KEY}
      UPLOAD_DIR: /data/uploads
      PRIVATE_UPLOAD_DIR: /data/private
      API_URL: ${API_URL}
      SITE_URL: ${SITE_URL}
      ADMIN_URL: ${ADMIN_URL}
      PORTAL_URL: ${SITE_URL}
      EMAIL_FROM: ${EMAIL_FROM}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      # Email "standard" via SMTP Vhosting (preventivi, notifiche, contact form)
      EMAIL_FROM_CRITICAL: ${EMAIL_FROM_CRITICAL}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      # Cifratura AES-256-GCM delle credenziali email salvate nel DB
      MAIL_ENC_KEY: ${MAIL_ENC_KEY}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
      BUGSINK_DSN: ${BUGSINK_DSN}
      CRON_SECRET: ${CRON_SECRET}
      ANALYTICS_PEPPER: ${ANALYTICS_PEPPER}
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY}
      BOOKING_TOKEN_SECRET: ${BOOKING_TOKEN_SECRET}
      # Integrazioni opzionali (degradano graceful se vuote)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      PAYPAL_MODE: ${PAYPAL_MODE}
      PAYPAL_WEBHOOK_ID: ${PAYPAL_WEBHOOK_ID}
      PAYPAL_RETURN_URL: ${PAYPAL_RETURN_URL}
      PAYPAL_CANCEL_URL: ${PAYPAL_CANCEL_URL}
      REVOLUT_API_KEY: ${REVOLUT_API_KEY}
      REVOLUT_MODE: ${REVOLUT_MODE}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # LLM principale (Infomaniak — EU/Svizzera, GDPR)
      INFOMANIAK_AI_TOKEN: ${INFOMANIAK_AI_TOKEN}
      INFOMANIAK_AI_PRODUCT_ID: ${INFOMANIAK_AI_PRODUCT_ID}
      # Generazione immagini (admin)
      KIE_API_KEY: ${KIE_API_KEY}
      UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      GOWA_URL: ${GOWA_URL}
      GOWA_BASIC_AUTH_USER: ${GOWA_BASIC_AUTH_USER}
      GOWA_BASIC_AUTH_PASS: ${GOWA_BASIC_AUTH_PASS}
      GOWA_WEBHOOK_SECRET: ${GOWA_WEBHOOK_SECRET}
      GOWA_DEVICE_ID: ${GOWA_DEVICE_ID}
      # MEGA S4 (object storage): consegna dei knowledge base gitignored al boot.
      # KB_DIR=/data/kb e' gia' impostato nel Dockerfile.
      S4_ENDPOINT: ${S4_ENDPOINT}
      S4_REGION: ${S4_REGION}
      S4_BUCKET: ${S4_BUCKET}
      S4_ACCESS_KEY_ID: ${S4_ACCESS_KEY_ID}
      S4_SECRET_ACCESS_KEY: ${S4_SECRET_ACCESS_KEY}
      # Cap captcha — server-side verification. Endpoint Cap (interno o pubblico
      # va bene; usiamo pubblico per simmetria col client). Provider switch via
      # CAPTCHA_PROVIDER_<UPPER_FORM>=cap per pilot mirati, CAPTCHA_PROVIDER=cap
      # per rollout globale.
      CAP_URL: ${CAP_URL}
      CAPTCHA_PROVIDER: ${CAPTCHA_PROVIDER}
      CAPTCHA_PROVIDER_ADMIN_LOGIN: ${CAPTCHA_PROVIDER_ADMIN_LOGIN}
      CAPTCHA_PROVIDER_PORTAL_LOGIN: ${CAPTCHA_PROVIDER_PORTAL_LOGIN}
      CAPTCHA_PROVIDER_CONTACT_FORM: ${CAPTCHA_PROVIDER_CONTACT_FORM}
      CAPTCHA_PROVIDER_NEWSLETTER_SUBSCRIBE: ${CAPTCHA_PROVIDER_NEWSLETTER_SUBSCRIBE}
      CAPTCHA_PROVIDER_GDPR_REQUEST: ${CAPTCHA_PROVIDER_GDPR_REQUEST}
      CAPTCHA_PROVIDER_BOOKING_CREATE: ${CAPTCHA_PROVIDER_BOOKING_CREATE}
      CAPTCHA_PROVIDER_BOOKING_RESCHEDULE: ${CAPTCHA_PROVIDER_BOOKING_RESCHEDULE}
      CAPTCHA_PROVIDER_EMBED_LEAD: ${CAPTCHA_PROVIDER_EMBED_LEAD}
      CAP_SECRET_ADMIN_LOGIN: ${CAP_SECRET_ADMIN_LOGIN}
      CAP_SECRET_PORTAL_LOGIN: ${CAP_SECRET_PORTAL_LOGIN}
      CAP_SECRET_CONTACT_FORM: ${CAP_SECRET_CONTACT_FORM}
      CAP_SECRET_NEWSLETTER_SUBSCRIBE: ${CAP_SECRET_NEWSLETTER_SUBSCRIBE}
      CAP_SECRET_GDPR_REQUEST: ${CAP_SECRET_GDPR_REQUEST}
      CAP_SECRET_BOOKING_CREATE: ${CAP_SECRET_BOOKING_CREATE}
      CAP_SECRET_BOOKING_RESCHEDULE: ${CAP_SECRET_BOOKING_RESCHEDULE}
      CAP_SECRET_EMBED_LEAD: ${CAP_SECRET_EMBED_LEAD}
      # Anche le site key servono server-side: `resolveKeyPair` in cap.ts
      # richiede ENTRAMBI sitekey+secret per costruire il path
      # `${CAP_URL}/<sitekey>/siteverify`. Senza la sitekey ritorna null →
      # "cap-keypair-not-configured" → 403 al form submit.
      CAP_SITEKEY_ADMIN_LOGIN: ${CAP_SITEKEY_ADMIN_LOGIN}
      CAP_SITEKEY_PORTAL_LOGIN: ${CAP_SITEKEY_PORTAL_LOGIN}
      CAP_SITEKEY_CONTACT_FORM: ${CAP_SITEKEY_CONTACT_FORM}
      CAP_SITEKEY_NEWSLETTER_SUBSCRIBE: ${CAP_SITEKEY_NEWSLETTER_SUBSCRIBE}
      CAP_SITEKEY_GDPR_REQUEST: ${CAP_SITEKEY_GDPR_REQUEST}
      CAP_SITEKEY_BOOKING_CREATE: ${CAP_SITEKEY_BOOKING_CREATE}
      CAP_SITEKEY_BOOKING_RESCHEDULE: ${CAP_SITEKEY_BOOKING_RESCHEDULE}
      CAP_SITEKEY_EMBED_LEAD: ${CAP_SITEKEY_EMBED_LEAD}
    volumes:
      - uploads_data:/data/uploads
      - private_data:/data/private
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - app-net
    # Solo su loopback: CloudPanel proxa da `http://127.0.0.1:3001`.
    ports:
      - "127.0.0.1:3001:3001"

  mcp:
    image: ghcr.io/federicokalik/calicchia-mcp:latest
    restart: always
    environment:
      NODE_ENV: production
      MCP_TRANSPORT: http
      PORT: 3002
      API_URL: http://api:3001
      MCP_PUBLIC_URL: ${MCP_PUBLIC_URL:-https://mcp.calicchia.design}
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-mcp.calicchia.design}
    depends_on:
      - api
    networks:
      - app-net
    ports:
      - "127.0.0.1:3002:3002"

  sito-v3:
    image: ghcr.io/federicokalik/calicchia-sito:latest
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      # JWT_SECRET: il middleware proxy.ts valida il cookie portal_token (firmato
      # dall'api con lo STESSO secret). Senza, hasValidPortalToken() ritorna sempre
      # false → ogni accesso /clienti/* viene redirezionato a /clienti/login anche
      # subito dopo un magic-link riuscito (incident 2026-05-29).
      JWT_SECRET: ${JWT_SECRET}
      # COOKIE_DOMAIN: necessario per cancellare cookie portal_token settati con
      # Domain=.calicchia.design quando il token risulta invalido lato middleware.
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      # PUBLIC_SITE_URL: base assoluta che proxy.ts usa per costruire il redirect
      # a /clienti/login. Il Dockerfile lo setta solo nel BUILDER stage (per il
      # build), ma il runtime stage non lo eredita → senza questo env il middleware
      # cade sul fallback http://localhost:3000 e il browser segue lì (incident
      # 2026-05-29). Riusa SITE_URL gia` presente nel .env.
      PUBLIC_SITE_URL: ${SITE_URL}
      # Runtime public config (consumato da /api/config -> RuntimeConfigProvider).
      # Cambiare valore = restart container, nessun rebuild dell'immagine.
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY}
      GOOGLE_MAPS_KEY: ${GOOGLE_MAPS_KEY}
      GA_MEASUREMENT_ID: ${GA_MEASUREMENT_ID}
      MOUSEFLOW_ID: ${MOUSEFLOW_ID}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      # PAYPAL_CLIENT_ID viene gia' passato in api (server-side); il sito lo
      # legge via /api/config dallo stesso valore. Override possibile via
      # PAYPAL_PUBLIC_CLIENT_ID se servisse separare SDK e OAuth (raro).
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      # Cap captcha — consumato da /api/config -> useCaptcha hook lato browser.
      # CAP_PUBLIC_URL = endpoint pubblico del container Cap (es. https://cap.calicchia.design).
      # I site key sono pubblici per design (vanno nel bundle JS), no secret qui.
      # Provider switch via CAPTCHA_PROVIDER_<UPPER_FORM>=cap per pilot mirati,
      # CAPTCHA_PROVIDER=cap per rollout globale.
      CAP_PUBLIC_URL: ${CAP_PUBLIC_URL}
      CAPTCHA_PROVIDER: ${CAPTCHA_PROVIDER}
      CAPTCHA_PROVIDER_ADMIN_LOGIN: ${CAPTCHA_PROVIDER_ADMIN_LOGIN}
      CAPTCHA_PROVIDER_PORTAL_LOGIN: ${CAPTCHA_PROVIDER_PORTAL_LOGIN}
      CAPTCHA_PROVIDER_CONTACT_FORM: ${CAPTCHA_PROVIDER_CONTACT_FORM}
      CAPTCHA_PROVIDER_NEWSLETTER_SUBSCRIBE: ${CAPTCHA_PROVIDER_NEWSLETTER_SUBSCRIBE}
      CAPTCHA_PROVIDER_GDPR_REQUEST: ${CAPTCHA_PROVIDER_GDPR_REQUEST}
      CAPTCHA_PROVIDER_BOOKING_CREATE: ${CAPTCHA_PROVIDER_BOOKING_CREATE}
      CAPTCHA_PROVIDER_BOOKING_RESCHEDULE: ${CAPTCHA_PROVIDER_BOOKING_RESCHEDULE}
      CAPTCHA_PROVIDER_EMBED_LEAD: ${CAPTCHA_PROVIDER_EMBED_LEAD}
      CAP_SITEKEY_ADMIN_LOGIN: ${CAP_SITEKEY_ADMIN_LOGIN}
      CAP_SITEKEY_PORTAL_LOGIN: ${CAP_SITEKEY_PORTAL_LOGIN}
      CAP_SITEKEY_CONTACT_FORM: ${CAP_SITEKEY_CONTACT_FORM}
      CAP_SITEKEY_NEWSLETTER_SUBSCRIBE: ${CAP_SITEKEY_NEWSLETTER_SUBSCRIBE}
      CAP_SITEKEY_GDPR_REQUEST: ${CAP_SITEKEY_GDPR_REQUEST}
      CAP_SITEKEY_BOOKING_CREATE: ${CAP_SITEKEY_BOOKING_CREATE}
      CAP_SITEKEY_BOOKING_RESCHEDULE: ${CAP_SITEKEY_BOOKING_RESCHEDULE}
      CAP_SITEKEY_EMBED_LEAD: ${CAP_SITEKEY_EMBED_LEAD}
    depends_on:
      - api
    networks:
      - app-net
    ports:
      - "127.0.0.1:3000:3000"

  admin:
    image: ghcr.io/federicokalik/calicchia-admin:latest
    restart: always
    depends_on:
      - api
    networks:
      - app-net
    # 8081 sull'host -> 80 nel container (nginx). Scegli un'altra porta se 8081 e' occupata.
    ports:
      - "127.0.0.1:8081:80"

  # Cap (https://trycap.dev) — self-hosted captcha PoW (Apache 2.0). Sostituisce
  # progressivamente Cloudflare Turnstile (vedi piano migrazione Cap 2026-05-29).
  # Esposto sul subdomain `cap.calicchia.design` via CloudPanel reverse-proxy →
  # `http://127.0.0.1:3010`. Dashboard built-in in /dashboard, auth via
  # CAP_ADMIN_PASSWORD (set una volta, manuale). Site key per-form configurate
  # dalla dashboard e referenziate in `.env.dockhand` come CAP_SITEKEY_*.
  valkey:
    image: valkey/valkey:alpine
    restart: always
    volumes:
      - valkey_data:/data
    networks:
      - app-net

  cap:
    image: tiago2/cap:latest
    restart: always
    environment:
      REDIS_URL: redis://valkey:6379
      # Cap richiede ADMIN_KEY (non ADMIN_PASSWORD). Verificato dai log al boot:
      # `if (!ADMIN_KEY) throw new Error("auth: Admin key missing")`.
      ADMIN_KEY: ${CAP_ADMIN_KEY}
      PUBLIC_URL: https://cap.calicchia.design
    depends_on:
      - valkey
    networks:
      - app-net
    ports:
      - "127.0.0.1:3010:3000"

  # CalDAV server — FASE 0 spike (storage a FILE + auth htpasswd). Vedi
  # apps/radicale/README.md. In Fase 3 l'image diventerà l'immagine custom con i
  # plugin che parlano con l'API (Postgres resta l'unica fonte di verità).
  # Richiede sul server: apps/radicale/config/users (htpasswd, creato a mano) +
  # vhost CloudPanel dav.calicchia.design → http://127.0.0.1:3011.
  radicale:
    image: tomsquest/docker-radicale:3.7.3.0
    restart: always
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - KILL
    environment:
      # Volume Docker (non bind-mount): il chown automatico di /data falliva
      # ("chown: /data: Permission denied"). Lo saltiamo — il volume nasce già
      # di proprietà dell'utente radicale (2999) ereditata dall'immagine.
      # (NB: le env dell'immagine NON funzionano con read_only → niente read_only.)
      TAKE_FILE_OWNERSHIP: "false"
    volumes:
      - ./apps/radicale/config:/config:ro
      - radicale_data:/data
    networks:
      - app-net
    ports:
      - "127.0.0.1:3011:5232"

volumes:
  postgres_data:
  uploads_data:
  private_data:
  valkey_data:
  radicale_data:

networks:
  app-net:
    driver: bridge
