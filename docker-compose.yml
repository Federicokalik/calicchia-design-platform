services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: caldes
      POSTGRES_USER: caldes
      POSTGRES_PASSWORD: caldes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caldes -d caldes"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
